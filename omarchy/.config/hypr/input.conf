# --------------------------------------------------
# Input global
# --------------------------------------------------
input {
  # Layout clavier
  kb_layout = us

  # Caps Lock -> touche Compose
  kb_options = compose:caps_toggle

  # Vitesse de répétition clavier
  repeat_rate = 40
  repeat_delay = 600

  # Active le numlock au démarrage
  numlock_by_default = true

  # Sensibilité globale neutre
  # 0 = pas d'ajustement global
  sensitivity = 0

  # IMPORTANT:
  # laisse à 0, sinon tu forces le no-accel globalement
  # et tu flingues le feeling du trackpad.
  # Hyprland documente force_no_accel comme option d'input,
  # et les overrides per-device n'acceptent pas cette option. ([wiki.hypr.land](https://wiki.hypr.land/Configuring/Keywords?utm_source=openai))
  force_no_accel = 0

  touchpad {
    # Clic à deux doigts = clic droit
    clickfinger_behavior = true

    # Scroll factor global des touchpads
    # Sert de base, mais ton Magic Trackpad a son override dédié plus bas
    scroll_factor = 0.4

    # Si un jour tu veux empêcher les touchpads internes de bouger
    # pendant la frappe, tu peux décommenter :
    # disable_while_typing = true
  }
}

# --------------------------------------------------
# Magic Trackpad Apple
# --------------------------------------------------
device {
    # Nom exact récupéré via : hyprctl devices
    # C'est bien la méthode recommandée par la doc Hyprland. ([wiki.hypr.land](https://wiki.hypr.land/Configuring/Keywords?utm_source=openai))
    name = apple-inc.-magic-trackpad-usb-c

    # Sensibilité du curseur pour CE device uniquement
    sensitivity = 0.15

    # Scroll plus doux / plus "macOS-like"
    # Chez toi il est bien appliqué, on le voit dans hyprctl devices.
    scroll_factor = 0.08

    # Scroll naturel
    natural_scroll = true

    # Accélération adaptative = mieux pour un trackpad
    # Hyprland expose bien adaptive / flat / custom. ([wiki.hypr.land](https://wiki.hypr.land/Configuring/Variables/?utm_source=openai))
    accel_profile = adaptive
}

# --------------------------------------------------
# Souris gaming SteelSeries Aerox 5
# --------------------------------------------------
device {
    # Premier device exposé par Hyprland
    name = steelseries-steelseries-aerox-5-wireless

    # Sensibilité neutre
    sensitivity = 0

    # Profil sans accel
    # "flat" = pas d'accélération logicielle type adaptive. ([wiki.hypr.land](https://wiki.hypr.land/Configuring/Variables/?utm_source=openai))
    accel_profile = flat
}

device {
    # Deuxième endpoint exposé comme souris chez toi
    # On duplique pour être sûr que toute la souris reste cohérente.
    name = steelseries-steelseries-aerox-5-wireless-3

    sensitivity = 0
    accel_profile = flat
}

# --------------------------------------------------
# Scroll plus confortable dans certains terminaux
# --------------------------------------------------
windowrule = match:class (Alacritty|kitty), scroll_touchpad 1.5
windowrule = match:class com.mitchellh.ghostty, scroll_touchpad 0.2

# --------------------------------------------------
# Gestes trackpad
# --------------------------------------------------
# 3 doigts horizontal = changement de workspace
gesture = 3, horizontal, workspace
