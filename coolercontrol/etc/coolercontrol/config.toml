# Reverse Proxy / CORS Configuration:
# Custom origins to allow in CORS requests. This is useful when accessing CoolerControl through
# a reverse proxy with a custom domain, or via port forwarding with a public IP. Add the full
# origin URL (scheme + host + port if non-standard).
# origins = ["https://coolercontrol.mydomain.com", "http://192.168.1.1:8080"]

# Header to check for the client's original protocol when behind a reverse proxy. Common values
# are "X-Forwarded-Proto" (nginx, Apache) or "X-Scheme". When this header indicates "https",
# the HTTP-to-HTTPS redirect is skipped (the proxy handles TLS termination).
# protocol_header = "X-Forwarded-Proto"

# Allow unencrypted HTTP connections from non-localhost addresses. By default, non-localhost
# HTTP requests are redirected to HTTPS when TLS is enabled. Set this to true to allow HTTP.
# Note: This should only be used as a last resort and is not recommended.
# allow_unencrypted = false

# Whether to auto-detect Super-I/O hardware sensors and load the appropriate kernel
# modules at startup. This helps ensure all hwmon chips are available. (x86_64 only)
# sensors_auto_detect = true

# CoolerControl Device settings Example:
# [settings.4b9cd1bc5fb2921253e6b7dd5b1b011086ea529d915a86b3560c236084452807]
# disabled = true
