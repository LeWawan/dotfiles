# Terminal & general settings
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm*:sitm=\E[3m'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

set -g base-index 1
set -sg escape-time 10
set -g focus-events on
set -g mouse on

# Prefix
set -g prefix C-b
bind C-b send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Copy mode (vi)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
if-shell "uname -s | grep -q Darwin" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'; \
   unbind -T copy-mode-vi Enter; \
   bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'; \
   unbind -T copy-mode-vi Enter; \
   bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# Pane navigation (vim-like)
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Splits
bind s split-window -v
bind v split-window -h

# Session tree
bind - choose-tree

# Sessionizer
bind -r f run-shell "tmux neww tmux-sessionizer"

# Status bar
set -g status on
set -g status-interval 2
set -g status-keys vi
set -g status-position bottom
set -g status-justify centre
set -g status-style "fg=colour136,bg=colour235"

set -g status-left-length 60
set -g status-left "#[fg=green]#H #[fg=black]• #[fg=green,bright]#(uname -r)#[default]"

set -g status-right-length 140
set -g status-right "#[fg=green,bg=default,bright]#(tmux-mem-cpu-load --colors --interval 2) "
set -ag status-right "#[fg=red,dim,bg=default]#(uptime | cut -f 4-5 -d ' ' | cut -f 1 -d ',') "
set -ag status-right " #[fg=white,bg=default]%a %l:%M:%S %p#[default] #{battery_icon} #{battery_percentage} "

set -g window-status-style "fg=colour244,bg=default"
set -g window-status-current-style "fg=colour166,bg=default"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'thewtex/tmux-mem-cpu-load'

# Initialize TPM (keep at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
