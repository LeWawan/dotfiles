# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g escape-time 0
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

# --- Prefix ---
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# --- Keybindings ---
bind r source-file ~/.config/tmux/tmux.conf

# Copy mode (vi)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane navigation (vim-like)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Splits
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# Sessions & windows
bind - choose-tree
bind -r f run-shell "tmux neww tmux-sessionizer"

# --- Status bar ---
set -g status on
set -g status-interval 2
set -g status-keys vi
set -g status-position bottom
set -g status-justify centre
set -g status-style "fg=colour136,bg=colour235"

set -g status-left-length 60
set -g status-left "#[fg=green]#(whoami)@#(uname)#[default]"

set -g status-right-length 140
set -g status-right "#[fg=green,bg=colour235, bright]#(tmux-mem-cpu-load --interval 2) "
set -ag status-right "#[fg=red,bg=colour235]#(uptime | cut -f 4-5 -d ' ' | cut -f 1 -d ',') "
set -ag status-right " #[fg=white,bg=colour235]%a %l:%M:%S %p#[default] #{battery_icon} #{battery_percentage} "

set -g window-status-style "fg=colour244,bg=colour235"
set -g window-status-current-style "fg=colour166,bg=colour235"

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'thewtex/tmux-mem-cpu-load'

# Initialize TPM (keep at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
